name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Build the release notes from this tag's commits into a gitignored file
      # (NOT the tracked CHANGELOG.md). Overwriting CHANGELOG.md here would leave
      # the worktree dirty and goreleaser aborts with "git is in a dirty state".
      # We also do NOT push the changelog back to main: the `branch_protect`
      # ruleset blocks direct pushes from github-actions[bot] (only the repo
      # owner bypasses). The docs Changelog page is updated via a normal PR.
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          # Docker images are built in docker.yml; goreleaser only ships binaries.
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
