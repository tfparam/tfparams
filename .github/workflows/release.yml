name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog to docs and main
        run: |
          # Avoid pushing from the detached tag HEAD: check out main first.
          cp CHANGELOG.md /tmp/CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp /tmp/CHANGELOG.md CHANGELOG.md
          mkdir -p docs
          cp CHANGELOG.md docs/changelog.md
          git add docs/changelog.md CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: sync changelog for ${{ github.ref_name }}"
          git push origin main

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # Use git-cliff's CHANGELOG.md as the release body (Docker is in docker.yml).
          args: release --clean --release-notes=CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
