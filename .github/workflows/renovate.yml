name: Renovate

# Self-hosted Renovate runner. Manages dependency updates for all the tfparams
# repos from here, so no Mend-hosted Renovate App install is needed. Per-repo
# behaviour lives in each repo's .github/renovate.json. See SETUP.md for the
# one-time RENOVATE_TOKEN secret.

on:
  schedule:
    # Weekly, Monday 02:00 UTC (inside the "before 5am on monday" config window).
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        required: false
        type: string

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # RENOVATE_TOKEN must have read+write+PR access to all three repos.
          RENOVATE_REPOSITORIES: tfkit/tfparams,tfkit/tfparams-action,tfkit/tfparams-orb
          RENOVATE_PLATFORM: github
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
